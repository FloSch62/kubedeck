appId: io.github.flosch62.kubedeck
productName: Kubedeck
executableName: kubedeck
directories:
  output: release
  buildResources: build
files:
  - dist/**
  - package.json
asar: true
extraResources:
  - from: ../client/dist
    to: client
  - from: build/icons/256x256.png
    to: icon.png
icon: build/icon.png
artifactName: kubedeck-${version}-${os}-${arch}.${ext}
npmRebuild: false
afterPack: scripts/after-pack.cjs
win:
  target:
    - target: nsis
      arch: [x64]
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
deb:
  afterInstall: linux/after-install.tpl
linux:
  category: Development
  synopsis: Kubernetes GUI
  icon: build/icons
  desktop:
    entry:
      StartupWMClass: Kubedeck
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
publish:
  provider: github
  owner: FloSch62
  repo: kubedeck
  releaseType: release
